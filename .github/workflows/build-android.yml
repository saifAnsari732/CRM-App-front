name: Build Android AAB

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build AAB
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run Expo Prebuild
        run: |
          set -e
          export CI=1
          npx expo prebuild --platform android --clean --no-install

      - name: Build Android AAB
        working-directory: android
        run: ./gradlew bundleRelease -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/release.keystore -Pandroid.injected.signing.store.password=35e46672f6141074bc080e0d79616afd -Pandroid.injected.signing.key.alias=c3e6c980534f93dc06f106f42a7e99db -Pandroid.injected.signing.key.password=738acf5f9d8a76ae5ff16de2b84c459e
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
